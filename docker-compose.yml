services:
  backend:
    build:
      context: ./backend
    container_name: research-assistant-backend
    ports:
      - "8000:8000"
    env_file:
      - ./backend/.env
    volumes:
      - ./backend:/app
      - chroma_data:/app/data/chroma
      - backend_cache:/app/data/cache

  frontend:
    build:
      context: ./frontend
    container_name: research-assistant-frontend
    ports:
      - "5173:5173"
    env_file:
      - ./frontend/.env
    depends_on:
      - backend
    volumes:
      - ./frontend:/app
      - /app/node_modules

volumes:
  chroma_data:
  backend_cache:
